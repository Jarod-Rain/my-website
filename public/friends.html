<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  @import url('https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;700&family=VT323&family=Fredoka+One&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'VT323', 'Comic Sans MS', cursive;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background-color: #1a0a2e;
    background-image: repeating-conic-gradient(#ff69b480 0% 25%, #00ffff40 0% 50%);
    background-size: 40px 40px;
    color: #fff;
    cursor: crosshair;
    text-align: center;
    padding: 20px;
  }
  .container {
    background: rgba(0,0,0,0.8);
    border: 4px solid #ff69b4;
    padding: 40px;
    max-width: 600px;
    position: relative;
    overflow: hidden;
  }
  .container::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 8px;
    background: linear-gradient(90deg, #ff0000, #ff7700, #ffff00, #00ff00, #00ffff, #0000ff, #8b00ff, #ff0000);
    background-size: 200% 100%;
    animation: rainbowSlide 3s linear infinite;
  }
  @keyframes rainbowSlide {
    0% { background-position: 0% 50%; }
    100% { background-position: 300% 50%; }
  }
  .page-emoji {
    font-size: 64px;
    margin: 20px 0 10px;
    animation: bounce 1s ease-in-out infinite alternate;
  }
  @keyframes bounce {
    0% { transform: translateY(0) scale(1); }
    100% { transform: translateY(-10px) scale(1.1); }
  }
  h1 {
    font-family: 'Fredoka One', cursive;
    font-size: 36px;
    background: linear-gradient(90deg, #ff0000, #ff7700, #ffff00, #00ff00, #00ffff, #0000ff, #8b00ff);
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: rainbowSlide 2s linear infinite;
    margin-bottom: 15px;
  }
  .construction {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background: repeating-linear-gradient(45deg, #000 0px, #000 10px, #ffcc00 10px, #ffcc00 20px);
    padding: 10px 20px;
    margin: 20px 0;
    font-family: 'Pixelify Sans', monospace;
    font-size: 18px;
    text-shadow: 1px 1px 0 #000;
  }
  .wiggle { animation: wiggle 0.5s ease-in-out infinite alternate; }
  @keyframes wiggle { 0% { transform: rotate(-8deg); } 100% { transform: rotate(8deg); } }
  p {
    font-size: 20px;
    color: #dda0dd;
    margin: 10px 0;
    line-height: 1.6;
  }
  .back-link {
    display: inline-block;
    margin-top: 20px;
    padding: 10px 25px;
    background: rgba(255,105,180,0.2);
    border: 2px solid #ff69b4;
    color: #ff69b4;
    text-decoration: none;
    font-family: 'VT323', monospace;
    font-size: 22px;
    transition: all 0.3s;
  }
  .back-link:hover {
    background: rgba(255,105,180,0.4);
    box-shadow: 0 0 15px #ff69b4;
    color: #fff;
  }
  .sparkles {
    font-size: 14px;
    color: #ff69b4;
    letter-spacing: 6px;
    margin: 15px 0;
    animation: blinky 0.8s step-end infinite;
  }
  @keyframes blinky { 0%,100% { opacity:1; } 50% { opacity:0; } }
</style>
</head>
<body>
  <div class="container">
    <div class="sparkles">✧ ♥ ✦ ★ ✧ ♥ ✦ ★ ✧</div>
    <div class="page-emoji">💕</div>
    <h1>MY FRIENDS!!</h1>
    <div class="construction">
      <span class="wiggle">🚧</span>
      UNDER CONSTRUCTION
      <span class="wiggle">🚧</span>
    </div>
    <p>im making a page 4 all my besties!! with links 2 their sites and everything~*</p>
    <p style="font-size:16px;color:#00ffff;">check back soon ok?? :3</p>
    <div class="sparkles">✧ ♥ ✦ ★ ✧ ♥ ✦ ★ ✧</div>
    <a href="index.html" class="back-link">♥ back 2 home ♥</a>
  </div>
</body>
</html>
