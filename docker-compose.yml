services:
  sparklepawz:
    build: .
    container_name: rainbow-sparkle-pawz
    restart: unless-stopped
    expose:
      - "3000"
    volumes:
      - ./data:/app/data
      - ./music:/app/music
      - ./public:/app/public
      - ./server.js:/app/server.js
    environment:
      - PORT=3000
    networks:
      - web

networks:
  web:
    external: true